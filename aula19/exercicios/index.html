<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Exercicio Aula 19</title>
</head>
<body>
    <form class="form" action="" method="get" autocomplete="on">
        <div class="formInstruction">
            <label for="iname">Nome:</label>
            <input type="text" class="name" placeholder="Seu nome">

            <label for="isurname">Sobrenome:</label>
            <input type="text" class="surname" placeholder="Seu Sobrenome">

            <label for="iweight">Peso:</label>
            <input type="number" class="weight" placeholder="Peso Atual">

            <label for="iheight">Altura</label>
            <input type="number" class="height" placeholder="Sua Altura">

            <input type="submit" value="Enviar">
        </div>
    </form>

    <div class="result"></div>
</body>
<script src="script.js"></script>
</html>
